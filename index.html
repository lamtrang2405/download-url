<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URL Downloader — Import sheet or links, get a ZIP</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f0f12;
      color: #e4e4e7;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .card {
      max-width: 420px;
      padding: 2rem;
    }
    h1 { font-size: 1.75rem; margin: 0 0 0.5rem; }
    p { color: #71717a; margin: 0 0 1.5rem; line-height: 1.5; }
    .btn {
      display: inline-block;
      padding: 0.85rem 1.5rem;
      background: #22d3ee;
      color: #0f0f12;
      text-decoration: none;
      font-weight: 600;
      border-radius: 10px;
      transition: background 0.15s;
    }
    .btn:hover { background: #67e8f9; }
    .muted { font-size: 0.85rem; color: #52525b; margin-top: 1.5rem; }
    .muted a { color: #22d3ee; }
  </style>
</head>
<body>
  <div class="card">
    <h1>URL Downloader</h1>
    <p>Import an Excel sheet or paste URL links. The app downloads everything and gives you a single ZIP.</p>
    <a href="https://render.com/deploy?repo=https://github.com/lamtrang2405/download-url" class="btn">Deploy free on Render →</a>
    <p class="muted">One click to get your own live app. No credit card. <a href="https://github.com/lamtrang2405/download-url">Source on GitHub</a></p>
  </div>
</body>
</html>
